<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quotations | Plumber</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <h2>Quotation History</h2>
        <p>View saved quotations with customer details, product summary and totals.</p>
      </div>
      <button onclick="loadQuotations()">Refresh</button>
    </section>

    <section class="stats">
      <div class="stat"><span>Total Quotations</span><strong id="quotationCount">0</strong></div>
      <div class="stat"><span>Total Value</span><strong id="totalValue">₹0</strong></div>
      <div class="stat"><span>Role</span><strong id="userRole">-</strong></div>
      <div class="stat"><span>Status</span><strong>Live</strong></div>
    </section>

    <section class="card">
      <h3>Saved Quotations</h3>
      <div id="quotationList"></div>
      <p id="quotationMessage" class="message"></p>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script>
    if (requireAuth(['admin', 'user'])) {
      renderNavbar('Quotation history');
      setText('userRole', getRole());
      loadQuotations();
    }

    async function loadQuotations() {
      const list = document.getElementById('quotationList');

      try {
        list.innerHTML = '<p class="muted">Loading quotations...</p>';
        const quotations = await apiRequest(`${API}/quotations`, { headers: authHeaders() }) || [];

        setText('quotationCount', quotations.length);

        const total = quotations.reduce((sum, quotation) => sum + Number(quotation.totalAmount || 0), 0);
        setText('totalValue', money(total));

        if (!quotations.length) {
          list.innerHTML = '<div class="quote-card muted">No quotations found.</div>';
          return;
        }

        list.innerHTML = quotations.map((quotation) => {
          const items = (quotation.products || []).map((item) => `
            <li>${item.code || item.productId?.code || 'Product'} × ${item.quantity || 0} — ${money(item.netPrice)}</li>
          `).join('');

          const userLabel = quotation.userId?.name ? `<p class="muted">Created by: ${quotation.userId.name}</p>` : '';

          return `
            <div class="quote-card">
              <div class="row-between">
                <div>
                  <div class="code">${quotation.quotationId || 'Quotation'}</div>
                  <strong>${quotation.customerName || 'Customer'}</strong>
                  <p class="muted">${new Date(quotation.createdAt).toLocaleDateString()}</p>
                  ${userLabel}
                </div>
                <div style="text-align:right;">
                  <strong>${money(quotation.totalAmount)}</strong><br />
                  <button class="btn-red btn-small" onclick="deleteQuotation('${quotation._id}')">Delete</button>
                </div>
              </div>
              <ul style="padding-left:18px;margin-top:10px;">${items}</ul>
            </div>
          `;
        }).join('');
      } catch (error) {
        list.innerHTML = `<div class="quote-card error">${error.message}</div>`;
      }
    }

    async function deleteQuotation(id) {
      if (!confirm('Delete this quotation?')) return;

      try {
        const data = await apiRequest(`${API}/quotations/${id}`, {
          method: 'DELETE',
          headers: authHeaders()
        });
        showMessage('quotationMessage', data.message || 'Quotation deleted successfully.');
        loadQuotations();
      } catch (error) {
        showMessage('quotationMessage', error.message, 'error');
      }
    }
  </script>
</body>
</html>
